name: Cleanup Actions Logs

on:
  schedule:
    # 每周三上午8点（北京时间 = UTC+8）
    - cron: '0 0 * * 3'
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow run logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 拉取所有已完成的 workflow runs
          run_ids=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/runs?status=completed&per_page=100" \
            --paginate -q '.workflow_runs[].id')

          for id in $run_ids; do
            echo "Deleting logs for run $id"
            gh api -X DELETE "/repos/${{ github.repository }}/actions/runs/$id/logs"
          done
