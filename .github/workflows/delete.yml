name: Delete Workflow Runs

on:
  schedule:
    # GitHub Action 使用 UTC 时间（比北京时间晚 8 小时）
    # 每周三北京时间上午 8:00 (即 UTC 时间 0:00) 运行一次
    - cron: "0 0 * * 3"
  workflow_dispatch: # 允许手动执行，配置方式参考了同步脚本 [1]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraiano/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0       # 保留天数（0 表示删除除保留项外所有日志）
          keep_minimum_runs: 3 # 至少保留最近 3 次运行记录
